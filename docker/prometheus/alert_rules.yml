# Alert rules for QLoRA application
groups:
  - name: qlora_alerts
    rules:
      # High CPU usage
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is above 80% for more than 5 minutes on {{ $labels.instance }}"

      # High memory usage
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is above 85% for more than 5 minutes on {{ $labels.instance }}"

      # Low disk space
      - alert: LowDiskSpace
        expr: (1 - (node_filesystem_avail_bytes{fstype!="tmpfs"} / node_filesystem_size_bytes{fstype!="tmpfs"})) * 100 > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Low disk space detected"
          description: "Disk usage is above 90% for more than 5 minutes on {{ $labels.instance }}"

      # Application down
      - alert: ApplicationDown
        expr: up{job="qlora-backend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "QLoRA backend application is down"
          description: "The QLoRA backend application has been down for more than 2 minutes"

      # Database connection issues
      - alert: DatabaseConnectionFailed
        expr: mongodb_up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "MongoDB connection failed"
          description: "Cannot connect to MongoDB for more than 2 minutes"

      # Redis connection issues
      - alert: RedisConnectionFailed
        expr: redis_up == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Redis connection failed"
          description: "Cannot connect to Redis for more than 2 minutes"

      # GPU memory usage
      - alert: HighGPUMemoryUsage
        expr: nvidia_gpu_memory_used_bytes / nvidia_gpu_memory_total_bytes * 100 > 95
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High GPU memory usage"
          description: "GPU memory usage is above 95% for more than 5 minutes on {{ $labels.instance }}"

      # Training job failures
      - alert: TrainingJobFailed
        expr: increase(qlora_training_jobs_failed_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Training job failed"
          description: "One or more training jobs have failed in the last 5 minutes"

      # API response time
      - alert: HighAPIResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API response time"
          description: "95th percentile API response time is above 5 seconds for more than 5 minutes"

      # Error rate
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) * 100 > 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 10% for more than 5 minutes on {{ $labels.instance }}"

  - name: system_alerts
    rules:
      # System load
      - alert: HighSystemLoad
        expr: node_load1 > 4
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High system load"
          description: "System load is above 4 for more than 5 minutes on {{ $labels.instance }}"

      # Network connectivity
      - alert: NetworkConnectivityIssue
        expr: node_network_receive_errs_total > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Network connectivity issues"
          description: "Network receive errors detected on {{ $labels.instance }}"

      # Process count
      - alert: TooManyProcesses
        expr: node_procs_running > 200
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Too many processes running"
          description: "More than 200 processes are running on {{ $labels.instance }}"